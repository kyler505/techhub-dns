name: Deploy Dev to PythonAnywhere

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: pythonanywhere-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fast backend gate
        shell: bash
        run: |
          set -euo pipefail
          python3 -m compileall backend/app

      - name: Deploy check for pull requests
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          echo "Release gates passed (no remote deployment on pull_request events)."

      - name: Load SSH key
        if: github.event_name != 'pull_request'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PA_SSH_PRIVATE_KEY }}

      - name: Add PythonAnywhere host key
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -4 -H ssh.pythonanywhere.com >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Run deploy script over SSH
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          PA_USERNAME: ${{ secrets.PA_USERNAME }}
        run: |
          set -euo pipefail
          ssh -4 \
            -o AddressFamily=inet \
            -o StrictHostKeyChecking=yes \
            "${PA_USERNAME}@ssh.pythonanywhere.com" \
            "PROJECT_ROOT=/home/techhub/techhub-dns-dev WEBAPP_DOMAIN=dev-techhub.pythonanywhere.com BRANCH=dev bash ~/techhub-dns-dev/scripts/deploy.sh"

      - name: Tail deploy.log on failure
        if: failure()
        shell: bash
        env:
          PA_USERNAME: ${{ secrets.PA_USERNAME }}
        run: |
          set +e
          ssh -4 \
            -o AddressFamily=inet \
            -o StrictHostKeyChecking=yes \
            "${PA_USERNAME}@ssh.pythonanywhere.com" \
            "tail -n 300 ~/techhub-dns-dev/deploy.log || true"

      - name: Download deploy.log artifact on failure
        if: failure()
        shell: bash
        env:
          PA_USERNAME: ${{ secrets.PA_USERNAME }}
        run: |
          set +e
          scp -4 \
            -o AddressFamily=inet \
            -o StrictHostKeyChecking=yes \
            "${PA_USERNAME}@ssh.pythonanywhere.com:~/techhub-dns-dev/deploy.log" \
            ./deploy.log
          ls -la ./deploy.log || true

      - name: Upload deploy.log artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pythonanywhere-deploy-log
          path: deploy.log
          if-no-files-found: ignore
