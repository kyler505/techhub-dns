name: Deploy to PythonAnywhere

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  release-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fast backend gate
        shell: bash
        run: |
          set -euo pipefail
          python3 -m compileall backend/app

      - name: Set up Node.js
        if: github.ref_name == 'main' || github.base_ref == 'main'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        if: github.ref_name == 'main' || github.base_ref == 'main'
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Full backend release gate (main only)
        if: github.ref_name == 'main' || github.base_ref == 'main'
        shell: bash
        run: |
          set -euo pipefail
          cd backend
          python3 tests/test_error_handling.py
          python3 tests/test_location_resolver.py

      - name: Install frontend dependencies
        if: github.ref_name == 'main' || github.base_ref == 'main'
        shell: bash
        run: |
          set -euo pipefail
          cd frontend
          npm ci

      - name: Full frontend release gate (main only)
        if: github.ref_name == 'main' || github.base_ref == 'main'
        shell: bash
        run: |
          set -euo pipefail
          cd frontend
          npm run lint
          npm run build

  deploy-dev:
    if: github.event_name == 'push' && github.ref_name == 'dev'
    needs: release-gates
    runs-on: ubuntu-latest
    concurrency:
      group: pythonanywhere-deploy-dev
      cancel-in-progress: false

    steps:
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PA_SSH_PRIVATE_KEY }}

      - name: Add PythonAnywhere host key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -4 -H ssh.pythonanywhere.com >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Run deploy script over SSH
        shell: bash
        env:
          PA_USERNAME: ${{ secrets.PA_USERNAME }}
        run: |
          set -euo pipefail
          ssh -4 \
            -o AddressFamily=inet \
            -o StrictHostKeyChecking=yes \
            "${PA_USERNAME}@ssh.pythonanywhere.com" \
            "PROJECT_ROOT=/home/techhub/techhub-dns-dev WEBAPP_DOMAIN=dev-techhub.pythonanywhere.com BRANCH=dev bash ~/techhub-dns-dev/scripts/deploy.sh"

      - name: Tail deploy.log on failure
        if: failure()
        shell: bash
        env:
          PA_USERNAME: ${{ secrets.PA_USERNAME }}
        run: |
          set +e
          ssh -4 \
            -o AddressFamily=inet \
            -o StrictHostKeyChecking=yes \
            "${PA_USERNAME}@ssh.pythonanywhere.com" \
            "tail -n 300 ~/techhub-dns-dev/deploy.log || true"

      - name: Download deploy.log artifact on failure
        if: failure()
        shell: bash
        env:
          PA_USERNAME: ${{ secrets.PA_USERNAME }}
        run: |
          set +e
          scp -4 \
            -o AddressFamily=inet \
            -o StrictHostKeyChecking=yes \
            "${PA_USERNAME}@ssh.pythonanywhere.com:~/techhub-dns-dev/deploy.log" \
            ./deploy.log || true

      - name: Upload deploy.log artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pythonanywhere-deploy-log
          path: deploy.log
          if-no-files-found: ignore

  deploy-prod:
    if: github.event_name == 'push' && github.ref_name == 'main'
    needs: release-gates
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: pythonanywhere-deploy-prod
      cancel-in-progress: false

    steps:
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PA_SSH_PRIVATE_KEY }}

      - name: Add PythonAnywhere host key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -4 -H ssh.pythonanywhere.com >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Run deploy script over SSH
        shell: bash
        env:
          PA_USERNAME: ${{ secrets.PA_USERNAME }}
        run: |
          set -euo pipefail
          ssh -4 \
            -o AddressFamily=inet \
            -o StrictHostKeyChecking=yes \
            "${PA_USERNAME}@ssh.pythonanywhere.com" \
            "PROJECT_ROOT=/home/techhub/techhub-dns WEBAPP_DOMAIN=techhub.pythonanywhere.com BRANCH=main bash ~/techhub-dns/scripts/deploy.sh"

      - name: Tail deploy.log on failure
        if: failure()
        shell: bash
        env:
          PA_USERNAME: ${{ secrets.PA_USERNAME }}
        run: |
          set +e
          ssh -4 \
            -o AddressFamily=inet \
            -o StrictHostKeyChecking=yes \
            "${PA_USERNAME}@ssh.pythonanywhere.com" \
            "tail -n 300 ~/techhub-dns/deploy.log || true"

      - name: Download deploy.log artifact on failure
        if: failure()
        shell: bash
        env:
          PA_USERNAME: ${{ secrets.PA_USERNAME }}
        run: |
          set +e
          scp -4 \
            -o AddressFamily=inet \
            -o StrictHostKeyChecking=yes \
            "${PA_USERNAME}@ssh.pythonanywhere.com:~/techhub-dns/deploy.log" \
            ./deploy.log || true

      - name: Upload deploy.log artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pythonanywhere-deploy-log
          path: deploy.log
          if-no-files-found: ignore
